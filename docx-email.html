<main><section class="tool-section docx-section" aria-labelledby="docx-title">
  <div class="section-heading"><div><h1 id="docx-title">docx email → HTML</h1><p>完全在此裝置轉換，不會上傳檔案。</p></div><output id="docx-status" class="status" aria-live="polite">等待 DOCX</output></div>
  <label class="file-drop" for="docx-input"><strong>選擇 DOCX 檔案</strong><span>僅限 .docx，最大 10 MB。會檢查檔名、大小和 DOCX ZIP 格式。</span><input id="docx-input" type="file" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" /></label>
  <p id="docx-error" class="error-message" role="alert"></p><p id="docx-warnings" class="warning-message" aria-live="polite"></p><p class="warning-message">Mammoth 僅協助基本 DOCX 相容性診斷；色彩、字級與底線由受限的 OOXML 執行屬性層補足。</p>
  <p class="image-notice">圖片可在本機預覽；寄出前請改用公開 HTTPS 圖片網址。Base64 圖片並非所有郵件用戶端都相容。</p>
  <div class="docx-workspace"><div class="code-side"><div class="panel-top"><span>已消毒的 HTML 原始碼</span><span>唯一輸出</span></div><textarea id="docx-source" readonly spellcheck="false" aria-label="已消毒的 HTML 原始碼" placeholder="轉換後的 HTML 會顯示在這裡"></textarea></div><div class="preview-side"><div class="panel-top"><span>郵件預覽</span><span>隔離 iframe</span></div><iframe id="docx-preview" title="docx email 預覽" sandbox></iframe></div></div>
  <div class="action-row"><button class="primary" id="copy-docx-html" disabled>複製 HTML</button><button id="download-docx-html" disabled>下載 .html</button></div>
</section></main><footer>工具箱 · 資料不會離開你的裝置</footer><script src="vendor/jszip-3.10.1.min.js"></script><script src="vendor/mammoth-1.11.0.browser.js"></script><script type="module" src="docx-email-page.js"></script></body></html>
