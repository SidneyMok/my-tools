<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="本機離線開發小工具：JSON、HTML 預覽與時間戳轉換。" />
  <title>JSON 處理器 | 工具箱</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">&lt;/&gt;</span><span>工具箱</span></a>
    <nav aria-label="工具導覽">
      <a class="active" href="index.html" aria-current="page">JSON</a>
      <a href="html-preview.html">HTML</a>
      <a href="timestamp.html">Timestamp</a>
      <a href="network.html">Network</a>
      <a href="docx-email.html">Docx Email</a>
    </nav>
    <span class="local-note"><i></i>本機運行</span>
  </header>

  <main>
    <section class="tool-section json-section" aria-labelledby="json-title">
      <div class="section-heading"><div><h1 id="json-title">JSON 處理器</h1><p>格式化、壓縮並驗證 JSON 資料。</p></div><div id="json-status" class="status" aria-live="polite">等待輸入</div></div>
      <div class="tool-grid json-grid">
        <label class="editor-panel"><span>輸入</span><textarea id="json-input" spellcheck="false" placeholder='貼上 JSON，例如 {"name":"工具箱"}' aria-label="JSON 輸入"></textarea></label>
        <label class="editor-panel"><span>結果</span><textarea id="json-output" spellcheck="false" readonly placeholder="處理結果將顯示在這裡" aria-label="JSON 結果"></textarea></label>
      </div>
      <p class="error-message" id="json-error" role="alert"></p>
      <div class="action-row"><button class="primary" id="format-json">格式化</button><button id="minify-json">壓縮</button><span class="action-spacer"></span><button class="icon-button" id="copy-json" title="複製結果" aria-label="複製結果">⧉</button><button class="icon-button" id="clear-json" title="清除內容" aria-label="清除內容">×</button></div>
    </section>

  </main>
  <footer>工具箱 · 資料不會離開你的裝置</footer>
  <script src="app.js"></script>
</body>
</html>
