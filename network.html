<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="查詢目前公網 IP 與單一 IPv4 或 IPv6 的網路資訊。" />
  <title>Network IP 查詢 | 工具箱</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">&lt;/&gt;</span><span>工具箱</span></a>
    <nav aria-label="工具導覽">
      <a href="index.html">JSON</a>
      <a href="html-preview.html">HTML</a>
      <a href="timestamp.html">Timestamp</a>
      <a class="active" href="network.html" aria-current="page">Network</a>
      <a href="docx-email.html">DOCX 郵件</a>
    </nav>
    <span class="local-note"><i></i>本機運行</span>
  </header>

  <main>
    <section class="tool-section timestamp-section network-section" aria-labelledby="network-title">
      <div class="section-heading"><div><h1 id="network-title">Network IP 查詢</h1><p>確認目前公網 IP，或查詢單一 IPv4、IPv6 位址。</p></div><div id="ip-status" class="status" aria-live="polite">準備中</div></div>
      <form id="ip-lookup-form" class="converter" novalidate>
        <label for="ip-lookup-input">IP 位址<input id="ip-lookup-input" name="ip" inputmode="text" autocomplete="off" spellcheck="false" placeholder="留白以查詢目前公網 IP；例如 8.8.8.8" /></label>
        <button class="primary wide" type="submit">查詢</button>
        <p id="ip-lookup-error" class="error-message" role="alert"></p>
      </form>
      <div id="ip-result" class="network-result converter" aria-live="polite" hidden></div>
      <button id="retry-ip" class="secondary" hidden>重新查詢</button>
      <p class="location-disclosure">歸屬地資料為 IP 資料庫推估，僅供參考，不能代表精確實體位置。</p>
    </section>
  </main>
  <footer>工具箱 · 查詢內容不會儲存在此工具中</footer>
  <script type="module" src="network.js"></script>
</body>
</html>
