<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="本機離線 Unix 時間戳轉換工具。" />
  <title>Unix 時間戳 | 工具箱</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html"><span class="brand-mark">&lt;/&gt;</span><span>工具箱</span></a>
    <nav aria-label="工具導覽">
      <a href="index.html">JSON</a>
      <a href="html-preview.html">HTML</a>
      <a class="active" href="timestamp.html" aria-current="page">Timestamp</a>
      <a href="network.html">Network</a>
    </nav>
    <span class="local-note"><i></i>本機運行</span>
  </header>

  <main>
    <section class="tool-section timestamp-section" aria-labelledby="time-title">
      <div class="section-heading"><div><h1 id="time-title">Unix 時間戳</h1><p>在 Unix 時間戳與本機日期時間之間轉換。</p></div></div>
      <div class="timestamp-grid">
        <div class="converter"><h3>時間戳 → 日期時間</h3><label>Unix 時間戳<input id="timestamp-input" inputmode="decimal" placeholder="例如 1721550600" /></label><div class="unit-toggle" role="group" aria-label="時間戳單位"><button class="selected" data-unit="seconds">秒</button><button data-unit="milliseconds">毫秒</button></div><button class="primary wide" id="convert-timestamp">轉換</button><output id="timestamp-result" class="result-box">輸入時間戳以開始</output></div>
        <div class="converter"><h3>日期時間 → 時間戳</h3><label>本機日期時間<input id="datetime-input" type="datetime-local" step="0.001" /></label><button class="secondary wide" id="use-now">使用目前時間</button><button class="primary wide" id="convert-datetime">轉換</button><output id="datetime-result" class="result-box">選擇日期時間以開始</output></div>
      </div>
    </section>
  </main>
  <footer>工具箱 · 資料不會離開你的裝置</footer>
  <script src="app.js"></script>
</body>
</html>
